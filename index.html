        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Nunito', 'Noto Sans JP', sans-serif;
            background-color: #e0f2fe; 
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        /* 核心動畫 */
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }

        @keyframes fireGlow {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(249, 115, 22, 0.6)); }
            50% { filter: drop-shadow(0 0 25px rgba(249, 115, 22, 0.9)); transform: scale(1.05); }
        }
        .animate-fire { animation: fireGlow 2s ease-in-out infinite; }

        ruby { ruby-align: center; }
        rt { font-size: 0.55em; color: #64748b; font-weight: 700; transform: translateY(-2px); }
        
        /* 隱藏卷軸但保留滾動功能 */
        ::-webkit-scrollbar { display: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .progress-ring__circle {
            transition: stroke-dashoffset 0.5s ease-in-out;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>

        // --- UTILS ---
        function levenshtein(a, b) {
            const m = Array.from({ length: a.length + 1 }, () => Array(b.length + 1).fill(0));
            for(let i=0; i<=a.length; i++) m[i][0] = i;
            for(let j=0; j<=b.length; j++) m[0][j] = j;
            for(let i=1; i<=a.length; i++) {
                for(let j=1; j<=b.length; j++) {
                    const cost = a[i-1] === b[j-1] ? 0 : 1;
                    m[i][j] = Math.min(m[i-1][j]+1, m[i][j-1]+1, m[i-1][j-1]+cost);
                }
            }
            return m[a.length][b.length];
        }

        function isKana(text) { return /^[\u3040-\u309F\u30A0-\u30FFー]*$/.test(text); }

        function toHiragana(text) {
            return text.replace(/[\u30A1-\u30F6]/g, match =>
                String.fromCharCode(match.charCodeAt(0) - 0x60)
            );
        }

        function getLogicalDateStr(offsetDays = 0) {
            // 凌晨3點換日邏輯
            const d = new Date(Date.now() - 3 * 3600 * 1000 + offsetDays * 24 * 3600 * 1000);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }
        function getYesterdayStr() { return getLogicalDateStr(-1); }

        function getDaysDiff(d1Str, d2Str) {
            if (!d1Str || !d2Str) return 999;
            const [y1, m1, d1] = d1Str.split('-').map(Number);
            const [y2, m2, d2] = d2Str.split('-').map(Number);
            const dt1 = new Date(y1, m1 - 1, d1);
            const dt2 = new Date(y2, m2 - 1, d2);
            return Math.round((dt1 - dt2) / 86400000);
        }

            utterance.voice = premiumVoice || jaVoices[0];
            utterance.rate = rate;

            window.currentUtterance = utterance;

        window.playAudio = function(text, rate = 1.05) {

            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            
            const playedLocally = playLocalTTS(text, rate);

                    const audio = new Audio(url);

        // --- QUEUE GENERATION ---
        function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

        function getProportionalWords(targetLevel, totalCount, filterFn = w => true) {
            const levels = ['N5', 'N4', 'N3', 'N2', 'N1'];
            const tIdx = levels.indexOf(targetLevel);
            let cEasier = Math.round(totalCount * 0.15);
            let cHarder = Math.round(totalCount * 0.05);
            let cTarget = totalCount - cEasier - cHarder;

            const getPool = (lvl) => shuffle(APP_DICTIONARY.filter(w => w.level === lvl && filterFn(w)));

            let poolEasier = getPool(levels[Math.max(0, tIdx - 1)]);
            let poolTarget = getPool(levels[tIdx]);
            let poolHarder = getPool(levels[Math.min(4, tIdx + 1)]);

            let result = [];
            result.push(...poolEasier.slice(0, cEasier));
            result.push(...poolHarder.slice(0, cHarder));
            result.push(...poolTarget.slice(0, cTarget));

            if (result.length < totalCount) {
                const usedIds = new Set(result.map(q => q.id));
                const remainingNeeded = totalCount - result.length;
                const fillPool = shuffle(APP_DICTIONARY.filter(w => !usedIds.has(w.id)));
                result.push(...fillPool.slice(0, remainingNeeded));
            }
            
            while (result.length < totalCount && APP_DICTIONARY.length > 0) {
                result.push({...APP_DICTIONARY[Math.floor(Math.random() * APP_DICTIONARY.length)]});
            }

            return result.slice(0, totalCount);
        }

        function generateTestQueue(targetLevel) {
            let queue = getProportionalWords(targetLevel, window.state.testTotal, w => {
                let p = window.state.userProgress[w.id];
                return !p || !p.hasBeenSeen;
            });
            return shuffle(queue).map(w => ({...w, isTest: true, isReview: false}));
        }

        function generateDailyQueue(requestAmount = null) {
            const now = Date.now();
            let reviews = [];
            for (let word of APP_DICTIONARY) {
                let p = window.state.userProgress[word.id];
                if (p && p.hasBeenSeen && p.nextReviewDate <= now && p.srsLevel > 0) {
                    reviews.push({...word, isReview: true});
                }
            }
            shuffle(reviews);

            const goalAmount = requestAmount || window.state.dailyGoal;
            // 確保複習題最多佔 75% (如 20題抽15題舊題，剩下的空間留給全新單字)
            let maxReviews = Math.floor(goalAmount * 0.75);
            let reviewCount = Math.min(reviews.length, maxReviews); 
            let neededNewWordCount = goalAmount - reviewCount;

            let queue = [];
            queue.push(...reviews.slice(0, reviewCount));

            let newWords = getProportionalWords(window.state.targetLevel, neededNewWordCount, w => {
                let p = window.state.userProgress[w.id];
                return !p || !p.hasBeenSeen;
            });
            queue.push(...newWords.map(w => {
                let p = window.state.userProgress[w.id];
                return {...w, isReview: (p && p.hasBeenSeen)};
            }));

            return shuffle(queue).slice(0, goalAmount);
        }

        window.createStudentAccount = async function() {
            const input = document.getElementById('new-student-id');
            const msgBox = document.getElementById('admin-msg');
            const newId = input.value.trim();

            if (!newId) {
                msgBox.className = "font-bold mt-4 px-4 py-2 rounded-lg text-sm border text-center w-full text-red-500 bg-red-50 border-red-100";
                msgBox.innerText = "請輸入帳號名稱！";
                msgBox.classList.remove('hidden');
                return;
            }

            if (!db || !currentUserAuth) {
                msgBox.className = "font-bold mt-4 px-4 py-2 rounded-lg text-sm border text-center w-full text-red-500 bg-red-50 border-red-100";
                msgBox.innerText = "資料庫未連線！";
                msgBox.classList.remove('hidden');
                return;
            }

            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'students', newId);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    msgBox.className = "font-bold mt-4 px-4 py-2 rounded-lg text-sm border text-center w-full text-orange-600 bg-orange-50 border-orange-200";
                    msgBox.innerText = "帳號已存在！請換一個。";
                    msgBox.classList.remove('hidden');
                } else {
                    await setDoc(docRef, {
                        studentId: newId,
                        createdAt: new Date().toISOString(),
                        streakDays: 0
                    });
                    
                    input.value = "";
                    msgBox.className = "font-bold mt-4 px-4 py-2 rounded-lg text-sm border text-center w-full text-green-600 bg-green-50 border-green-200";
                    msgBox.innerText = `帳號 ${newId} 建立成功！`;
                    msgBox.classList.remove('hidden');
                    
                    window.fetchStudentsList();
                }
            } catch (e) {
                console.error("Create account failed", e);
                msgBox.className = "font-bold mt-4 px-4 py-2 rounded-lg text-sm border text-center w-full text-red-500 bg-red-50 border-red-100";
                msgBox.innerText = "建立失敗，請稍後再試。";
                msgBox.classList.remove('hidden');
            }
        }

        window.fetchStudentsList = async function() {
            if (!db) return;
            try {
                const querySnapshot = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'students'));
                const list = [];
                querySnapshot.forEach((doc) => {
                    list.push({ id: doc.id, ...doc.data() });
                });
                
                list.sort((a, b) => (b.streakDays || 0) - (a.streakDays || 0));
                window.state.adminStudentsList = list;
                
                if (window.state.view === 'admin') window.render();
            } catch (e) {
                console.error("Error fetching students:", e);
                window.state.adminStudentsList = [];
                if (window.state.view === 'admin') window.render();
            }
        };

        window.deleteStudentAccount = async function(id) {
            if (window.state.confirmDeleteId !== id) {
                window.state.confirmDeleteId = id;
                window.render();
                
                setTimeout(() => {
                    if (window.state.confirmDeleteId === id) {
                        window.state.confirmDeleteId = null;
                        if (window.state.view === 'admin') window.render();
                    }
                }, 3000);
                return;
            }
            
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', id));
                window.state.confirmDeleteId = null;
                await window.fetchStudentsList(); 
                
                const msgBox = document.getElementById('admin-msg');
                if(msgBox) {
                    msgBox.className = "font-bold mt-4 px-4 py-2 rounded-lg text-sm border text-center w-full text-green-600 bg-green-50 border-green-200";
                    msgBox.innerText = `帳號已成功刪除！`;
                    msgBox.classList.remove('hidden');
                }
            } catch(e) {
                console.error("Error deleting student:", e);
                const msgBox = document.getElementById('admin-msg');
                if(msgBox) {
                    msgBox.className = "font-bold mt-4 px-4 py-2 rounded-lg text-sm border text-center w-full text-red-500 bg-red-50 border-red-100";
                    msgBox.innerText = `刪除失敗，請稍後再試！`;
                    msgBox.classList.remove('hidden');
                }
            }
        };

        function renderWeeklyTrophies() {
            let dow = new Date(Date.now() - 3 * 3600 * 1000).getDay();
            let shiftedDow = dow === 0 ? 6 : dow - 1; 

            let todayStr = getLogicalDateStr();
            let lastStr = window.state.lastStreakDate;
            
            let isActive = [];
            for (let i = 0; i < 7; i++) {
                let offsetFromToday = shiftedDow - i;
                let slotDateStr = getLogicalDateStr(-offsetFromToday);
                
                if (offsetFromToday > 0) { 
                    let diffFromLastStreak = getDaysDiff(lastStr, slotDateStr);
                    // 只要該天包含在連勝天數範圍內，就會被點亮
                    isActive[i] = (diffFromLastStreak >= 0) && (diffFromLastStreak < window.state.streakDays);
                } else if (offsetFromToday === 0) { 
                    isActive[i] = window.state.completedToday >= window.state.dailyGoal && !window.state.justCompletedTest;
                    if (!isActive[i] && lastStr === todayStr && window.state.streakDays > 0) {
                        isActive[i] = true;
                    }
                } else { 
                    isActive[i] = false;
                }
            }

            const jpDays = ['月', '火', '水', '木', '金', '土', '日'];
            
            // 將外層容器改為不強迫滿版，讓進度條緊密貼合並居中
            let html = `<div class="flex flex-col items-center gap-1 w-full max-w-[280px]">
                <!-- 日文星期標籤列 -->
                <div class="flex px-1.5">`;
                
            for (let i = 0; i < 7; i++) {
                let isToday = i === shiftedDow;
                let textColor = isToday ? 'text-indigo-500' : 'text-slate-400';
                if (isActive[i]) textColor = 'text-yellow-500';
                // 標籤寬度固定與下方天數一致 (w-8)，確保上下完美對齊
                html += `<div class="w-8 flex justify-center"><span class="text-[11px] font-black ${textColor}">${jpDays[i]}</span></div>`;
            }
                
            html += `</div>
                <!-- 無縫膠囊進度條 -->
                <div class="bg-slate-100 p-1.5 rounded-[1.5rem] flex relative shadow-inner">`;

            for (let i = 0; i < 7; i++) {
                let active = isActive[i];
                let isToday = i === shiftedDow;
                let offsetFromToday = shiftedDow - i;
                let isMakeUpDay = (offsetFromToday === 1 && window.state.madeUpYesterday);
                
                let bgClass = 'bg-transparent text-slate-300';
                if (active) {
                    // 移除獨立方塊的 shadow-sm，確保相鄰黃底的無縫接合
                    bgClass = 'bg-yellow-400 text-white z-10';
                } else if (isToday) {
                    bgClass = 'bg-white text-slate-300 rounded-full shadow-sm z-10 border border-slate-200';
                }

                let roundedClass = 'rounded-full';
                if (active) {
                    let leftActive = (i > 0 && isActive[i-1]);
                    let rightActive = (i < 6 && isActive[i+1]);
                    
                    if (!leftActive && !rightActive) roundedClass = 'rounded-full'; 
                    else if (!leftActive && rightActive) roundedClass = 'rounded-l-full'; 
                    else if (leftActive && !rightActive) roundedClass = 'rounded-r-full'; 
                    else roundedClass = ''; // 中間的天數保持直角，實現無縫連接
                }

                let iconHtml = '';
                if (active) {
                    if (isMakeUpDay) {
                        iconHtml = ''; // 補考完成後，亮起黃底但不跳獎杯
                    } else if (isToday) {
                        iconHtml = window.state.streakDays > 1 ? icons.crown : icons.trophy;
                    } else {
                        iconHtml = icons.crown; 
                    }
                } else if (!isToday) {
                    iconHtml = `<div class="w-2.5 h-2.5 rounded-full bg-slate-200 transition-colors"></div>`; // 沒練習的灰底點點
                } else {
                    iconHtml = `<div class="w-3 h-3 rounded-full bg-slate-200 transition-colors"></div>`;
                }

                let marker = isToday ? `<div class="absolute -bottom-2.5 w-1.5 h-1.5 bg-purple-400 rounded-full shadow-sm z-20"></div>` : '';
                
                html += `
                    <div class="w-8 h-8 flex items-center justify-center relative transition-all duration-300 ${bgClass} ${roundedClass}">
                        ${iconHtml}
                        ${marker}
                    </div>`;
            }

            html += `</div></div>`;
            return html;
        }

                            <p class="text-slate-500 font-bold text-lg">每日目標 <span class="text-purple-600 font-black">${window.state.dailyGoal}</span> 個</p>

            container.innerHTML = `

        window.changeLevel = async function(newLevel) {
            window.state.targetLevel = newLevel;
            window.state.hasTested = false; 
            await window.saveProgress();
            window.render();
        }

        window.adjustGoal = async function(amount) {
            let newGoal = window.state.dailyGoal + amount;
            newGoal = Math.round(newGoal / 5) * 5; 
            window.state.dailyGoal = Math.min(50, Math.max(5, newGoal));
            await window.saveProgress();
            window.render();
        }

        window.resumeSession = function() {
            window.unlockAudio();
            window.state.view = 'study';
            window.render();
        }

        window.cancelSession = function() {
            window.state.currentWord = null;
            window.state.sessionQueue = [];
            window.state.historyQueue = [];
            window.saveProgress();
            window.render();
        }

        window.startTest = function() {
            window.unlockAudio();
            window.state.sessionQueue = generateTestQueue(window.state.targetLevel);
            window.state.completedToday = 0;
            window.state.isTesting = true;
            window.state.isMakeUp = false;
            window.state.historyQueue = [];
            nextWord();
        }

        window.startMakeUp = function() {
            window.unlockAudio();
            window.state.isMakeUp = true;
            window.state.isTesting = false;
            window.state.sessionQueue = generateDailyQueue(20); 
            window.state.completedToday = 0;
            window.state.historyQueue = [];
            nextWord();
        }

        window.startDaily = function() {
            window.unlockAudio();
            window.state.sessionQueue = generateDailyQueue();
            window.state.completedToday = 0;
            window.state.isTesting = false;
            window.state.isMakeUp = false;
            window.state.historyQueue = [];
            nextWord();
        }

        window.startExtra = function() {
            window.unlockAudio();
            // 直接產生 5 題加入佇列，不修改 window.state.dailyGoal 以避免影響永久設定
            window.state.sessionQueue = generateDailyQueue(5); 
            window.state.isTesting = false;
            window.state.isMakeUp = false;
            window.state.historyQueue = [];
            nextWord();
        }

        function nextWord() {
            if (window.state.sessionQueue.length === 0) {
                if (window.state.isTesting) {
                    window.state.hasTested = true;
                    window.state.isTesting = false;
                    window.state.justCompletedTest = true;
                    window.state.dailyGoal = 20; 
                    window.state.completedToday = 0; 
                } else if (window.state.isMakeUp) {
                    window.state.streakDays = (window.state.savedStreak || 0) + 1; 
                    window.state.savedStreak = 0;
                    window.state.lastStreakDate = getYesterdayStr(); 
                    window.state.madeUpYesterday = true;
                    window.state.isMakeUp = false;
                    window.state.completedToday = 0; 
                    window.state.justCompletedTest = false;
                } else {
                    window.state.justCompletedTest = false;
                    if (window.state.completedToday >= window.state.dailyGoal) {
                        const today = getLogicalDateStr();
                        if (window.state.lastStreakDate !== today) {
                            window.state.streakDays++;
                            window.state.lastStreakDate = today;
                        }
                    }
                }
                window.state.currentWord = null; 
                window.state.view = 'completion';
                window.saveProgress();
                window.render();
                return;
            }
            window.state.currentWord = window.state.sessionQueue.shift();
            window.state.currentWord.countedMistake = false; 
            window.state.inputValue = "";
            window.state.mistakes = 0;
            window.state.view = 'study';

            window.render();

        window.goPrevious = function() {
            if (window.state.historyQueue.length === 0) return;
            
            if (window.currentAudio) window.currentAudio.pause();
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            
            const prevItem = window.state.historyQueue.pop();
            
            if (window.state.currentWord) {
                window.state.sessionQueue.unshift(window.state.currentWord);
            }
            
            if (!prevItem.wasMistake) {
                window.state.completedToday = Math.max(0, window.state.completedToday - 1);
            } else {
                for (let i = window.state.sessionQueue.length - 1; i >= 0; i--) {
                    if (window.state.sessionQueue[i].id === prevItem.word.id) {
                        window.state.sessionQueue.splice(i, 1);
                        break;
                    }
                }
            }

            window.state.currentWord = prevItem.word;
            window.state.inputValue = prevItem.word.kana; 
            window.state.mistakes = prevItem.wasMistake ? 1 : 0; 
            window.state.view = 'success'; 
            window.saveProgress(); 
            window.render();
        }

            const normTarget = toHiragana(target);

                hintEl.innerHTML = `<span class="text-green-600 bg-green-100 px-3 py-1 rounded-full shadow-sm">正確！點擊確認 ✨</span>`;

                if (normTarget.startsWith(normVal)) {

        // --- Core SRS Algorithm ---
        function evalSRS() {
            const word = window.state.currentWord;
            let p = window.state.userProgress[word.id] || { srsLevel: 0, nextReviewDate: 0, hasBeenSeen: false, totalMistakes: 0, inMyNotes: false, hiddenFromMistakes: false };
            
            // 判斷是否為「完全沒有錯誤記錄的全新單字」
            let isPerfectNew = (!word.isReview && !word.isSessionRepeat && window.state.mistakes === 0);
            let nextLevel = p.srsLevel;

            if (window.state.mistakes > 0) {
                nextLevel = 0; // 答錯，掉入 5分鐘後 (同回合重考)
            } else {
                if (isPerfectNew) {
                    nextLevel = 10; // 全新單字一次答對 -> 直升 3個月後 (Index 10)
                } else if (word.isSessionRepeat) {
                    nextLevel = 1;  // 同回合補考答對 -> 1天後 (Index 1)
                } else {
                    let currentLevel = p.srsLevel === 0 ? 1 : p.srsLevel; // 避免舊進度卡死
                    nextLevel = Math.min(SRS_INTERVALS.length - 1, currentLevel + 1); // 依序晉級 3, 5, 7... 天
                }
            }

            const days = SRS_INTERVALS[nextLevel];
            let nextReviewTime = 0;
            if (days === 0) {
                nextReviewTime = Date.now() + 5 * 60000; // 5分鐘
            } else {
                // 精準對齊跨日邏輯：設定為未來 N 天後的「凌晨 3 點」
                const d = new Date(Date.now() - 3 * 3600 * 1000 + days * 24 * 3600 * 1000);
                d.setHours(3, 0, 0, 0);
                nextReviewTime = d.getTime();
            }

            window.state.userProgress[word.id] = {
                ...p,
                srsLevel: nextLevel,
                nextReviewDate: nextReviewTime,
                hasBeenSeen: true,
                displayTag: SRS_TAG_NAMES[nextLevel]
            };
        }

                        ${icons.cup} <span class="text-sm">${window.state.completedToday}/${activeGoal}</span>
                    </div>
                    <button class="p-2 opacity-0"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1 0-2.83 2 2 0 0 1 0 2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg></button>
                </div>

                <div class="flex-1 flex flex-col p-4 items-center justify-start animate-slide-up z-10 w-full max-w-sm mx-auto overflow-y-auto hide-scrollbar pb-12">
                    <div class="bg-[#f0fdf4] w-full rounded-[1.5rem] shadow-sm border border-green-200 flex flex-col pt-6 pb-8 px-6 relative animate-slide-up shrink-0 mb-auto">
                        <div class="flex justify-between items-start mb-6">
                            <div class="animate-pop">${icons.check}</div>
                            <span class="${srsBadgeStyle} px-3 py-1 rounded-l-full font-black text-xs absolute right-0 top-6 shadow-sm">${pInfo.displayTag}</span>
                        </div>
                        
                        <div class="text-xs font-bold text-slate-400 mb-1 tracking-wider">
                            ${word.sentenceKana || ""}
                        </div>
                        <div class="text-xl font-bold text-slate-800 leading-relaxed border-b border-green-100 pb-5">
                            ${highlightedSentence}
                        </div>
                        <div class="text-[10px] text-slate-400 font-medium text-left w-full mt-2">
                            * 例句發音為系統自動生成，請以上方灰色讀音為準。
                        </div>

                        <div class="mt-6 flex flex-col items-center justify-center w-full">
                            <div class="flex items-center gap-3 mb-2 justify-center">
                                <div class="text-3xl text-indigo-600">${generateRuby(word.kanji, word.kana)}</div>
                                <button onclick="window.playAudio('${word.kana}', 1.05)" class="shrink-0 p-2 bg-indigo-50 text-indigo-600 rounded-full hover:bg-indigo-100 active:scale-90 transition-transform shadow-sm">
                                    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
                                </button>
                            </div>
                            <p class="text-slate-500 font-bold text-sm">${word.meaning}</p>
                        </div>
                    </div>

                    <div class="w-full bg-white rounded-3xl shadow-lg border border-slate-100 p-4 animate-slide-up shrink-0 mt-4">
                        
                        <div class="flex gap-2 mb-4 border-b border-slate-50 pb-4">
                            <button onclick="window.playAudio('${audioSentence}', 0.6)" class="flex-1 bg-blue-50 hover:bg-blue-100 text-blue-600 rounded-2xl py-2 flex flex-col items-center justify-center active:scale-95 transition-transform shadow-sm">
                                ${icons.turtle}
                                <span class="text-[10px] font-bold mt-1">慢速</span>
                            </button>
                            <button onclick="window.playAudio('${audioSentence}', 1.05)" class="flex-1 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 rounded-2xl py-2 flex flex-col items-center justify-center active:scale-95 transition-transform shadow-sm border-2 border-indigo-200">
                                ${icons.volume}
                                <span class="text-[10px] font-bold mt-1">預設語速</span>
                            </button>
                            <button onclick="window.playAudio('${audioSentence}', 1.45)" class="flex-1 bg-purple-50 hover:bg-purple-100 text-purple-600 rounded-2xl py-2 flex flex-col items-center justify-center active:scale-95 transition-transform shadow-sm">
                                ${icons.zap}
                                <span class="text-[10px] font-bold mt-1">日本人語速</span>
                            </button>
                        </div>

                        <div class="flex gap-3">
                            <button onclick="window.goPrevious()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-500 rounded-2xl py-3 flex items-center justify-center shadow-sm active:scale-95 transition-all font-black text-sm gap-1 ${window.state.historyQueue.length === 0 ? 'opacity-40 cursor-not-allowed' : ''}" ${window.state.historyQueue.length === 0 ? 'disabled' : ''}>
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                                上一題
                            </button>
                            <button onclick="window.handleNext()" class="flex-[1.5] bg-[#22c55e] hover:bg-green-600 text-white rounded-2xl py-3 flex items-center justify-center shadow-[0_4px_0_#16a34a] active:shadow-none active:translate-y-1 transition-all font-black text-sm gap-1">
                                下一題
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                            </button>
                        </div>

                        <div class="flex justify-around mt-4 pt-2">
                            <button class="flex flex-col items-center gap-1 opacity-40"><div class="bg-slate-100 p-2 rounded-xl"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg></div><span class="text-[9px] font-bold">其他例句</span></button>
                            <button onclick="window.openNotebook()" class="flex flex-col items-center gap-1 text-indigo-600 active:scale-90 transition-transform"><div class="bg-indigo-50 p-2 rounded-xl"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m18 15-6-6-6 6"/></svg></div><span class="text-[9px] font-bold">錯題筆記</span></button>
                            <button onclick="window.openModal()" class="flex flex-col items-center gap-1 text-indigo-600 active:scale-90 transition-transform"><div class="bg-indigo-50 p-2 rounded-xl"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div><span class="text-[9px] font-bold">單字詳情</span></button>
                            <button class="flex flex-col items-center gap-1 opacity-40"><div class="bg-slate-100 p-2 rounded-xl"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/></svg></div><span class="text-[9px] font-bold">發音檢測</span></button>
                        </div>
                    </div>
                </div>
            `;
        }

        window.handleNext = async function() {
            const wasMistake = window.state.mistakes > 0;
            window.state.historyQueue.push({
                word: window.state.currentWord,
                wasMistake: wasMistake
            });

            if (wasMistake) {
                window.state.currentWord.isSessionRepeat = true; 
                window.state.sessionQueue.push(window.state.currentWord);
            } else {
                window.state.completedToday++;
            }
            
            window.saveProgress();
            nextWord();
        }

        // 5. Completion View
        function renderCompletion() {
            let msgTitle = window.state.justCompletedTest ? "測驗完成！" : "任務達成！";
            let msgDesc = window.state.justCompletedTest ? "已為您建立專屬複習題庫" : `連續學習 ${window.state.streakDays} 天！`;

            container.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center bg-slate-900 relative overflow-hidden animate-slide-up">
                    <div class="absolute inset-0 opacity-30" style="background-image: radial-gradient(circle at center, #fef08a 2px, transparent 2px); background-size: 40px 40px; animation: slideUp 20s linear infinite;"></div>

                    <div class="z-10 flex flex-col items-center text-center">
                        <div class="w-32 h-32 mb-6 animate-pop" style="filter: drop-shadow(0 0 30px rgba(253, 224, 71, 0.8));">
                            <svg width="100%" height="100%" viewBox="0 0 24 24" fill="#fde047" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                        </div>
                        
                        <div class="bg-slate-800/80 backdrop-blur-md px-6 py-2 rounded-full mb-8 border border-slate-700">
                            <span class="text-slate-300 font-bold text-sm">Sandy_JP</span>
                        </div>

                        <h1 class="text-4xl font-black text-white mb-2 tracking-tighter" style="text-shadow: 0 4px 20px rgba(255,255,255,0.3);">
                            ${msgTitle}
                        </h1>
                        
                        <p class="text-yellow-200 font-bold text-xl mt-6 animate-pulse">${msgDesc}</p>
                    </div>

                    <div class="absolute bottom-10 w-full px-6 z-10">
                        <button onclick="window.goToDashboard()" class="w-full bg-white text-slate-900 hover:bg-slate-100 text-xl font-black py-4 rounded-2xl active:scale-95 transition-transform shadow-xl">
                            回首頁
                        </button>
                    </div>
                </div>
            `;
        }

        // 6. Dictionary Modal
        const modal = document.getElementById('dict-modal');
        const modalContent = document.getElementById('dict-modal-content');

        window.openModal = function(wordId) {
            let word = window.state.currentWord;
            
            if (wordId !== undefined) {
                word = APP_DICTIONARY.find(w => w.id === wordId) || word;
            }
            
            if (!word) return;

            document.getElementById('modal-word').innerHTML = generateRuby(word.kanji, word.kana);
            document.getElementById('modal-pos').innerText = word.pos;
            document.getElementById('modal-level').innerText = word.level;
            document.getElementById('modal-meaning').innerText = word.meaning;
            
            const targetRuby = `<ruby>${word.kanji}<rt class="text-indigo-400 font-bold">${word.kana}</rt></ruby>`;
            const highlightedSentence = word.sentenceKanji.split(word.kanji).join(`<span class="text-indigo-600 font-black">${targetRuby}</span>`);
            
            document.getElementById('modal-sentence-kana').innerText = word.sentenceKana || "";
            document.getElementById('modal-sentence').innerHTML = highlightedSentence;
            document.getElementById('modal-sentence-meaning').innerHTML = word.sentenceMeaning.replace(/<u>(.*?)<\/u>/g, '<span class="font-bold text-slate-700">$1</span>');
            
            const audioSentence = word.sentenceKanji.split(word.kanji).join(word.kana);

            document.getElementById('modal-audio-btn').onclick = () => window.playAudio(audioSentence, 1.05);
            document.getElementById('modal-word-audio-btn').onclick = () => window.playAudio(word.kana, 1.05);

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('translate-y-full');
            }, 10);
        }

        window.closeModal = function() {
            modal.classList.add('opacity-0');
            modalContent.classList.add('translate-y-full');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }
        
        window.goToLogin = function() {
            window.state.view = 'login';
            window.render();
        };
        
        window.goToDashboard = async function() {
            window.state.view = 'dashboard';
            if(currentStudentId) {
                await window.saveProgress();
            }
            window.render();
        };

        window.render = render; 

        modal.addEventListener('click', (e) => { if (e.target === modal) window.closeModal(); });

        // 啟動 App
        initFirebase();
    </script>
</body>
</html>
